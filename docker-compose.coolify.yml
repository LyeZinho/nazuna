# Standalone Coolify Compose (ports 6050-6059)

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: anime-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waifubot}
      POSTGRES_USER: ${POSTGRES_USER:-waifu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "6050:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-waifu} -d ${POSTGRES_DB:-waifubot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anime-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6051:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: anime-bot-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3071
      DATABASE_URL: postgres://${POSTGRES_USER:-waifu}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-waifubot}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme}
      CORS_ORIGIN: ${DASHBOARD_URL:-https://nazuna.devscafe.org}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "6052:3071"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: anime-bot-discord
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DISCORD_TOKEN: ${DISCORD_BOT_TOKEN}
      CLIENT_ID: ${DISCORD_CLIENT_ID}
      API_URL: http://api:3071
    depends_on:
      - api

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: anime-bot-dashboard
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: ${API_URL:-https://api-nazuna.devscafe.org}
      PUBLIC_DASHBOARD_URL: ${DASHBOARD_URL:-https://nazuna.devscafe.org}
    ports:
      - "6053:3173"

volumes:
  postgres_data:
  redis_data:
